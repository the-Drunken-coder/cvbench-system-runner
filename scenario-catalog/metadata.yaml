    license_url: https://creativecommons.org/licenses/by/3.0/
    attribution: “Cars driving at night” by Editor (YouTube user Editor), via Wikimedia Commons, licensed CC BY 3.0.
    transformation: Frames 320–370 sampled every second frame, re-encoded as JPEG quality 90, timestamps normalized to 25 fps times the stride, and human-reviewed target, ignore, and ROI annotations added by CVBench contributors.
    source_sha256: 3dfc2c1ae60762e45ea68bc417695cc25a4fde5fcd771d4e3f8e59b0f2f7e9f8
  rv1-c3d1:
