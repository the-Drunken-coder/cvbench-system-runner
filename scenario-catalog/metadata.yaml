    attribution: “Self driving cars - EU2016NL” by EU2016NL, via Wikimedia Commons, licensed CC BY 3.0.
    transformation: Frames 300–360 sampled every second frame, re-encoded as JPEG quality 90, timestamps normalized to 25 fps times the stride, and human-reviewed target, ignore, and ROI annotations added by CVBench contributors.
    source_sha256: 7f0439180dd985eec74823418c521dd8d4092e3cfe653f2cd475b8412328d177
