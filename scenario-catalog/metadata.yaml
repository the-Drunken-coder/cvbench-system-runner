schema_version: cvbench.scenario-catalog-metadata/v1
catalog:
  version: 3.0.0
  status: public
  title: CVBench public scenario catalog
  description: Exact public calibration media, annotations, scoring boundaries, and baseline evidence for every current CVBench scenario.
  author: CVBench contributors
scenarios:
  synthetic-acquisition:
    title: First acquisition
    description: A single synthetic target enters a clean field and must be acquired promptly.
    failure_modes: [late acquisition, missed entry, unstable initial identity]
  synthetic-visible-retention:
    title: Visible retention
    description: A continuously visible synthetic target tests uninterrupted tracking.
    failure_modes: [visible dropout, localization drift, premature track termination]
  synthetic-occlusion-reacquisition:
    title: Occlusion reacquisition
    description: A target disappears behind a deterministic occluder and returns.
    failure_modes: [failed reacquisition, identity switch, false coasting]
  synthetic-multi-target-pair:
    title: Two-target tracking
    description: Two simultaneous targets test independent tracks and duplicate suppression.
    failure_modes: [track merge, duplicate track, missed target]
  synthetic-multi-target-identity:
    title: Multi-target identity
    description: Four targets exercise association and stable identity under crossing motion.
    failure_modes: [identity switch, track merge, track fragmentation]
  synthetic-false-detection:
    title: Empty ground truth
    description: A deliberately target-free sequence measures hallucinations; its exhaustive annotation set is empty.
    failure_modes: [background hallucination, persistent false track, false high confidence]
  synthetic-resource-stress:
    title: Resource stress
    description: Eight simultaneous synthetic targets increase association and processing load.
    failure_modes: [latency growth, dropped targets, resource saturation]
  synthetic-occlusion-gap-100ms:
    title: 100 ms occlusion gap
    description: A short full occlusion tests continuity at the smallest gap tier.
    failure_modes: [short-gap identity switch, duplicate reacquisition]
  synthetic-occlusion-gap-250ms:
    title: 250 ms occlusion gap
    description: A quarter-second full occlusion tests temporal memory.
    failure_modes: [identity switch, slow reacquisition]
  synthetic-occlusion-gap-500ms:
    title: 500 ms occlusion gap
    description: A half-second full occlusion tests association beyond immediate motion.
    failure_modes: [identity reset, missed return]
  synthetic-occlusion-gap-1000ms:
    title: 1 second occlusion gap
    description: A one-second full occlusion tests durable temporal state.
    failure_modes: [track expiry, new-identity reacquisition]
  synthetic-occlusion-gap-2000ms:
    title: 2 second occlusion gap
    description: The longest synthetic occlusion tests controlled track retirement and return.
    failure_modes: [stale coasting, failed reacquisition, identity reuse]
  synthetic-track-id-churn:
    title: Track ID churn
    description: Forty-eight short-lived target births test ID lifecycle integrity over the longest current sequence.
    failure_modes: [track ID reuse, ID exhaustion, state contamination]
  rvmot-a1c9:
    title: Vehicle loading and partial occlusion
    description: A continuous five-second MEVA sequence tracks every supported mover across the full image while people work around a vehicle.
    failure_modes: [partial-occlusion loss, duplicate identity, incomplete track]
  rvmot-b7e2:
    title: Close-proximity handoff
    description: Two people overlap and exchange position beside a vehicle during a continuous native-cadence full-frame sequence.
    failure_modes: [identity switch, track merge, fragmentation]
  rvmot-c4f6:
    title: Parking-area people and vehicles
    description: A wide MEVA view combines close people, a truncated entrant, and road vehicles under full-frame exhaustive scoring.
    failure_modes: [small-object miss, background false track, cross-class association error]
  mot17-02:
    title: MOT17-02 pedestrian tracking
    description: A fixed-camera street sequence with scale change, occlusion, and dense pedestrian interaction.
    failure_modes: [occlusion loss, identity switch, small-person miss]
  mot17-04:
    title: MOT17-04 pedestrian tracking
    description: A high-angle crowded plaza sequence with long trajectories and extensive neutral non-target regions.
    failure_modes: [crowd association error, fragmentation, false track]
  mot17-09:
    title: MOT17-09 pedestrian tracking
    description: A moving-camera urban pedestrian sequence with foreground crossings and variable scale.
    failure_modes: [camera-motion false track, identity switch, missed reappearance]
  mot17-10:
    title: MOT17-10 pedestrian tracking
    description: A busy street sequence with partial occlusion, edge truncation, and intersecting trajectories.
    failure_modes: [boundary loss, track merge, fragmentation]
  mot17-11:
    title: MOT17-11 pedestrian tracking
    description: A moving viewpoint follows pedestrians through scale and background changes.
    failure_modes: [scale-change miss, identity drift, background false track]
  mot17-13:
    title: MOT17-13 pedestrian tracking
    description: A 25 FPS urban sequence with frequent occlusion and people entering and leaving the image.
    failure_modes: [entry miss, occlusion identity switch, premature termination]
  mot20-01:
    title: MOT20-01 dense pedestrian tracking
    description: A dense 25 FPS pedestrian scene tests association under sustained overlap.
    failure_modes: [crowd merge, duplicate track, missed pedestrian]
  mot20-02:
    title: MOT20-02 dense pedestrian tracking
    description: A long dense pedestrian sequence tests stable identities and false-track accumulation.
    failure_modes: [long-run fragmentation, identity switch, false-track accumulation]
  mot20-03:
    title: MOT20-03 dense pedestrian tracking
    description: A very crowded elevated view tests small-person detection and association at high density.
    failure_modes: [small-person miss, dense-crowd identity switch, track fragmentation]
  mot20-05:
    title: MOT20-05 dense pedestrian tracking
    description: The longest and densest selected sequence stresses online association and bounded track state.
    failure_modes: [resource saturation, identity churn, persistent false track]
sources:
  synthetic:
    title: CVBench deterministic synthetic generator
    creator: CVBench contributors
    source_url: https://github.com/the-Drunken-coder/cvbench-system-runner/blob/main/src/cvbench/synthetic.py
    license: CC0-1.0
    attribution: No attribution required; provenance retained for reproducibility.
    transformation: Generated deterministically as exact JPEG frame sequences by cvbench.synthetic.
  motchallenge:
    title: MOTChallenge MOT16 pixels, MOT17 labels, and MOT20 training sequences
    creator: MOTChallenge benchmark publishers and contributing sequence owners
    source_url: https://motchallenge.net/
    license: CC-BY-NC-SA-3.0
    license_url: https://creativecommons.org/licenses/by-nc-sa/3.0/
    attribution: MOTChallenge assets and CVBench derivatives are displayed for noncommercial hobby evaluation under CC BY-NC-SA 3.0 with attribution and share-alike; repository code remains under its separate LICENSE.
    transformation: MOT17 updated ground truth is applied to canonical MOT16 JPEG pixels; MOT20 uses its canonical JPEGs. One-based xywh is converted to pixel-edge xyxy with only visible-frame clipping. No truth is interpolated.
    archive_provenance:
      MOT16.zip: {bytes: 1954509127, sha256: b944a7ddf0fbce8742a238b9717658d26a8810ab8595e94ba7b0d9ffad3a291b}
      MOT17Labels.zip: {bytes: 10107022, sha256: 0aa79322e91583369f42f17c4d79a0b145380d8732487bba59272048dc82b2b9}
      MOT20.zip: {bytes: 5028926248, sha256: ebcf0e3d44e4f50b5357d24817e5db485d777633d1b8ca9e8380d1c8437dbdd7}
    cadence_disclosure: Timestamps are derived from one-based ordered JPEG ordinals and publisher-declared fixed 25 or 30 FPS cadence. Original container PTS is unavailable and is not claimed.
    license_boundary: MOTChallenge assets and derivatives are CC BY-NC-SA 3.0 noncommercial share-alike material; CVBench code uses the repository LICENSE.
    selected_sequence_ids: [MOT17-02, MOT17-04, MOT17-09, MOT17-10, MOT17-11, MOT17-13, MOT20-01, MOT20-02, MOT20-03, MOT20-05]
    scoring_boundary: Class-1 marked pedestrians are scored exhaustively over the full frame. Official distractor, static-person, reflection, person-on-vehicle, and other non-target rows are evaluator-only neutral ignore after target matching.
  rvmot-a1c9:
    title: MEVA KF1 2018-03-05 bus camera G340
    creator: Kitware Inc. and the Intelligence Advanced Research Projects Activity (IARPA)
    dataset: Multiview Extended Video with Activities (MEVA) Known Facility 1
    dataset_version: Ground-camera r13 video; Kitware annotation commit 421841a75577b697c314e952e585aecbb1b99e17
    sequence: 2018-03-05.13-15-00.13-20-00.bus.G340.r13.avi
    source_url: https://mevadata-public-01.s3.amazonaws.com/drops-123-r13/2018-03-05/13/2018-03-05.13-15-00.13-20-00.bus.G340.r13.avi
    annotation_url: https://gitlab.kitware.com/meva/meva-data-repo/-/tree/421841a75577b697c314e952e585aecbb1b99e17/annotation/DIVA-phase-2/MEVA/kitware/2018-03-05/13
    license: CC-BY-4.0
    license_url: https://creativecommons.org/licenses/by/4.0/
    attribution: MEVA dataset by Kitware Inc. and IARPA, licensed CC BY 4.0; CVBench derivative modifications stated below.
    frame_range: Source frames 2813–2962 inclusive
    native_fps: 30 FPS
    transformation: Exact consecutive frames downscaled from 1920x1080 to 896x504 without aspect distortion and re-encoded as deterministic JPEG quality 78; upstream boxes scaled to output pixels.
    annotation_provenance: Per-frame MEVA geometry and types records supply class, box, and upstream identity; every output frame was visually inspected.
    corrections: Upstream activity IDs [3,9,13,14] map to p-001, [6] to p-002, and [2,4,5,7,10] to v-001 after visually verified same-object reconciliation; coordinate medians resolve duplicate boxes; no temporal interpolation.
