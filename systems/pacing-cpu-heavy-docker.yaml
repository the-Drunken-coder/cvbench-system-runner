schema_version: cvbench.system/v1
id: pacing-cpu-heavy
revision: v1

runtime:
  type: docker
  image: cvbench-example-good:v1
  command: ["python", "-m", "cvbench.examples.good_tracker"]
  environment:
    CVBENCH_PACING_EVIDENCE_MODE: cpu-heavy
    CVBENCH_PACING_EVIDENCE_DELAY_SECONDS: "0.15"

readiness:
  type: stdout_pattern
  pattern: CVBENCH_READY
  timeout_seconds: 10

shutdown:
  grace_period_seconds: 3

resources:
  cpu_limit: 4
  memory_limit_mb: 2048
  network_access: false
