schema_version: cvbench.system/v1
id: classical-motion-baseline
revision: real-video-v2

runtime:
  type: docker
  image: cvbench-real-video-baseline:v2
  command: ["python", "-m", "cvbench.examples.real_video_baseline"]

readiness:
  type: stdout_pattern
  pattern: CVBENCH_READY
  timeout_seconds: 30

shutdown:
  grace_period_seconds: 5

resources:
  cpu_limit: 4
  memory_limit_mb: 2048
  network_access: false
