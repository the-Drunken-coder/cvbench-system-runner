schema_version: cvbench.benchmark/v1
id: persistent-target-tracking
version: 1.0.0

input:
  mode: online_replay
  protocol: frame_socket_v1
  playback_rate: 1.0

output:
  protocol: jsonl
  schema: cvbench.track/v1

thresholds:
  confirmed_track_min_duration_ms: 250
  visible_dropout_tolerance_ms: 100
  max_match_center_error_px: 35
  minimum_match_iou: 0.3
  acquisition_deadlines_ms: [100, 250, 500, 1000]
  latency_deadline_ms: 250
  high_confidence_threshold: 0.8
  out_of_bounds: reject
  class_agnostic: false

scenarios:
  - ../scenarios/synthetic-v1/acquisition/scenario.yaml
  - ../scenarios/synthetic-v1/visible_retention/scenario.yaml
  - ../scenarios/synthetic-v1/occlusion_reacquisition/scenario.yaml
  - ../scenarios/synthetic-v1/multi_target_pair/scenario.yaml
  - ../scenarios/synthetic-v1/multi_target_identity/scenario.yaml
  - ../scenarios/synthetic-v1/false_detection/scenario.yaml
  - ../scenarios/synthetic-v1/resource_stress/scenario.yaml
  - ../scenarios/synthetic-v1/occlusion_gap_100ms/scenario.yaml
  - ../scenarios/synthetic-v1/occlusion_gap_250ms/scenario.yaml
  - ../scenarios/synthetic-v1/occlusion_gap_500ms/scenario.yaml
  - ../scenarios/synthetic-v1/occlusion_gap_1000ms/scenario.yaml
  - ../scenarios/synthetic-v1/occlusion_gap_2000ms/scenario.yaml

resources:
  cpu_limit: 4
  memory_limit_mb: 2048
  network_access: false

reporting:
  generate_json: true
  generate_html: true
  generate_failure_packets: true

max_run_seconds: 60
max_output_records: 100000
max_output_line_bytes: 1000000
max_total_output_bytes: 50000000
max_output_records_per_second: 10000
