schema_version: cvbench.benchmark/v1
id: real-video-v1
version: 1.0.0

input:
  mode: online_replay
  protocol: frame_socket_v1
  playback_rate: 20.0

output:
  protocol: jsonl
  schema: cvbench.track/v1

thresholds:
  confirmed_track_min_duration_ms: 250
  visible_dropout_tolerance_ms: 100
  max_match_center_error_px: 100
  minimum_match_iou: 0.2
  ignore_match_iou: 0.5
  acquisition_deadlines_ms: [100, 250, 500, 1000]
  latency_deadline_ms: 250
  high_confidence_threshold: 0.8
  out_of_bounds: reject
  class_agnostic: false

# The seed keeps ordering reproducible while preventing a SUT from relying on
# the public manifest order. Sequence IDs are opaque and do not name labels.
# Evaluation order is shuffled privately per run; this public manifest is not a secret.

scenarios:
  - ../scenarios/real-video-v1/rv1-a7f3/scenario.yaml
  - ../scenarios/real-video-v1/rv1-b2c8/scenario.yaml
  - ../scenarios/real-video-v1/rv1-c3d1/scenario.yaml

resources:
  cpu_limit: 4
  memory_limit_mb: 2048
  network_access: false

reporting:
  generate_json: true
  generate_html: true
  generate_failure_packets: false

max_run_seconds: 30
max_output_records: 10000
max_output_line_bytes: 1000000
max_total_output_bytes: 50000000
max_output_records_per_second: 10000
