schema_version: cvbench.benchmark/v1
id: long-running-stability
version: 1.0.0

input:
  mode: online_replay
  protocol: frame_socket_v1
  playback_rate: 1.0

thresholds:
  visible_dropout_tolerance_ms: 100
  max_match_center_error_px: 35
  minimum_match_iou: 0.3

# Concatenation is intentional: one SUT process sees repeated stream boundaries,
# which exercises cleanup, ID growth, state contamination, drift, and recovery.
scenarios:
  - ../scenarios/synthetic-v1/resource_stress/scenario.yaml
  - ../scenarios/synthetic-v1/occlusion_reacquisition/scenario.yaml
  - ../scenarios/synthetic-v1/false_detection/scenario.yaml
  - ../scenarios/synthetic-v1/resource_stress/scenario.yaml
  - ../scenarios/synthetic-v1/occlusion_reacquisition/scenario.yaml
  - ../scenarios/synthetic-v1/false_detection/scenario.yaml
  - ../scenarios/synthetic-v1/resource_stress/scenario.yaml
  - ../scenarios/synthetic-v1/occlusion_reacquisition/scenario.yaml
  - ../scenarios/synthetic-v1/false_detection/scenario.yaml
  - ../scenarios/synthetic-v1/resource_stress/scenario.yaml

resources:
  cpu_limit: 4
  memory_limit_mb: 2048
  network_access: false

reporting:
  generate_json: true
  generate_html: true
  generate_failure_packets: true

max_run_seconds: 60
max_output_records: 200000
