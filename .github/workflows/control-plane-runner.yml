name: Trusted benchmark runner

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cvbench-trusted-runner
  cancel-in-progress: false

jobs:
  lease-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      CVBENCH_API_BASE_URL: ${{ vars.CVBENCH_API_BASE_URL }}
      CVBENCH_RUNNER_TOKEN: ${{ secrets.CVBENCH_RUNNER_TOKEN }}
    steps:
      - name: Check runner configuration
        run: test -n "$CVBENCH_API_BASE_URL" && test -n "$CVBENCH_RUNNER_TOKEN"
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install the trusted CVBench engine
        run: python -m pip install .
      - name: Lease and run at most one submission
        run: python scripts/run_control_plane_job.py
