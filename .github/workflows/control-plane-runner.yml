name: Trusted benchmark runner

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cvbench-trusted-runner
  cancel-in-progress: false

jobs:
  lease-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: cvbench-production
    env:
      CVBENCH_API_BASE_URL: ${{ vars.CVBENCH_API_BASE_URL }}
      CVBENCH_RUNNER_TOKEN: ${{ secrets.CVBENCH_RUNNER_TOKEN }}
    steps:
      - name: Check runner configuration
        run: test -n "$CVBENCH_API_BASE_URL" && test -n "$CVBENCH_RUNNER_TOKEN"
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: refs/heads/main
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install the trusted CVBench engine
        run: python -m pip install .
      - name: Verify and hydrate the public real-video corpus
        run: python scripts/hydrate_real_video_corpus.py
      - name: Lease and run at most one submission
        run: python scripts/run_control_plane_job.py
      - name: Force cleanup and assert no benchmark container survives
        if: always()
        run: |
          docker ps -aq --filter label=cvbench.control-plane-job \
            | xargs --no-run-if-empty docker rm --force
          test -z "$(docker ps -aq --filter label=cvbench.control-plane-job)"
