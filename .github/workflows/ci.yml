name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  control-plane:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: control-plane/package-lock.json
      - run: npm ci
      - run: npm test

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e '.[dev]'
      - run: ruff check .
      - run: pytest
      - run: cvbench validate --benchmark benchmarks/persistent-target-tracking.yaml --system systems/example-good-local.yaml

  docker-scored-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install .
      - run: docker build -f examples/Dockerfile.good -t cvbench-example-good:v1 .
      - run: cvbench run --benchmark benchmarks/persistent-target-tracking.yaml --system systems/example-good-docker.yaml --output docker-runs
      - run: python scripts/assert_docker_report.py docker-runs
      - name: Assert no scored container remains
        run: test -z "$(docker ps -aq --filter ancestor=cvbench-example-good:v1)"
      - name: Prepare and score the isolated real-video tranche
        run: |
          python -m pip install -r requirements-real-video.lock
          python scripts/prepare_real_video.py --output data/real-video-v1
          docker build -f examples/Dockerfile.real-video-baseline -t cvbench-real-video-baseline:v1 .
          cvbench run --benchmark benchmarks/real-video-v1.yaml --system systems/real-video-baseline-docker.yaml --output real-video-docker-runs
          python scripts/assert_docker_report.py real-video-docker-runs --real-video
      - name: Assert no real-video container remains
        run: test -z "$(docker ps -aq --filter ancestor=cvbench-real-video-baseline:v1)"
